<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best AI Writing Tools - AI Tools Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#3b82f6;--cyan:#06b6d4;--dark:#020617;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:rgba(148,163,184,0.7);--star:#fbbf24;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,0.18) 0%,transparent 70%),#020617;pointer-events:none;}

/* NAV */
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:68px;background:rgba(2,6,23,0.82);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;box-shadow:0 0 18px rgba(59,130,246,0.45);}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.nav-logo-text span{color:#3b82f6;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links>li{position:relative;}
.nav-links>li>a,.nav-links>li>button{display:flex;align-items:center;gap:5px;padding:8px 14px;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;cursor:pointer;transition:color .2s,background .2s;}
.nav-links>li>a:hover,.nav-links>li>button:hover,.nav-links>li:hover>button{color:#fff;background:rgba(255,255,255,0.06);}
.nav-arrow{width:14px;height:14px;opacity:.5;transition:transform .3s;}
.nav-links>li:hover .nav-arrow{transform:rotate(180deg);opacity:1;}
.mega-drop{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(-6px);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;min-width:760px;background:rgba(10,18,40,0.97);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 30px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(59,130,246,0.08);}
.nav-links>li:hover .mega-drop{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
.mega-drop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.mega-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--text);transition:background .2s;}
.mega-item:hover{background:rgba(59,130,246,0.1);}
.mega-item-text strong{display:block;font-size:12px;font-weight:600;color:#fff;}
.mega-item-text span{font-size:11px;color:var(--muted);}

.nav-right{display:flex;align-items:center;gap:12px;}
.nav-btn-primary{padding:7px 18px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(59,130,246,0.35);}

/* CONTENT */
.hero-cat{text-align:center;padding:80px 20px 40px;position:relative;z-index:1;}
.cat-badge{display:inline-flex;width:48px;height:48px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:14px;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;}
.hero-cat h1{font-family:'Syne',sans-serif;font-size:clamp(32px,5vw,54px);margin-bottom:14px;}
.hero-cat p{color:var(--muted);max-width:600px;margin:0 auto;line-height:1.6;}

.tools-section{padding:20px 60px 80px;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
.grid-header{margin-bottom:30px;padding-bottom:15px;border-bottom:1px solid var(--border);font-size:14px;}
.grid-header span{color:var(--blue);font-weight:700;}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}

.card{display:flex;flex-direction:column;background:rgba(15,23,42,0.6);border:1px solid var(--border);border-radius:18px;padding:24px;text-decoration:none;color:var(--text);transition:all 0.3s ease;height:100%;}
.card:hover{transform:translateY(-6px);border-color:rgba(59,130,246,0.4);background:rgba(20,30,50,0.8);box-shadow:0 20px 40px rgba(0,0,0,0.4);}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.card-logo{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-logo img{width:36px;height:36px;object-fit:contain;}
.card-score{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;color:#fff;}
.card-score svg{width:12px;height:12px;fill:var(--star);}
.card h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#fff;}
.card p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
.card-tag{padding:5px 12px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd;border-radius:8px;font-size:11px;font-weight:600;}

footer{text-align:center;padding:40px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;}
@media(max-width:900px){nav{padding:0 20px;}.nav-links{display:none;}.tools-section{padding:20px 20px 60px;}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">A</div>
    <span class="nav-logo-text">AI<span>Tools</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li>
      <button>Categories <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="mega-drop">
        <div class="mega-drop-grid">
          <a href="ai-writing-tools.html" class="mega-item"><div class="mega-icon">✍️</div><div class="mega-item-text"><strong>Writing</strong><span>Copywriting, blogs</span></div></a>
          <a href="#" class="mega-item"><div class="mega-icon">🎨</div><div class="mega-item-text"><strong>Images</strong><span>Art & design</span></div></a>
          <a href="#" class="mega-item"><div class="mega-icon">🤖</div><div class="mega-item-text"><strong>Chatbots</strong><span>AI Assistants</span></div></a>
        </div>
      </div>
    </li>
    <li><a href="#">Blog</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-btn-primary">+ Submit Tool</button>
  </div>
</nav>

<section class="hero-cat">
  <div class="cat-badge">✍️</div>
  <h1>Writing & Editing AI Tools</h1>
  <p>Our curated list of the best AI writing assistants to boost your productivity.</p>
</section>

<section class="tools-section">
  <div class="grid-header">Showing <span>48</span> writing tools</div>
  <div class="tools-grid" id="toolsGrid"></div>
</section>

<script>
const writingTools = [
  // ICI : On change l'URL pour pointer vers jasper.html
  { name: "Jasper", desc: "Enterprise-grade AI copywriting tool for marketing teams.", tag: "Copywriting", score: "4.9", img: "images/jasper.png", url: "jasper.html" },
  { name: "ChatGPT", desc: "The ultimate conversational AI for brainstorming and drafting.", tag: "General", score: "4.9", img: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg", url: "chatgpt.html" },
  { name: "Copy AI", desc: "Generate marketing copy and social media posts in seconds.", tag: "Marketing", score: "4.8", img: "images/copy.jpg", url: "#" },
  // ... (le reste de vos outils)
];

const grid = document.getElementById('toolsGrid');
function renderTools() {
  grid.innerHTML = writingTools.map(tool => `
    <a href="${tool.url}" class="card">
      <div class="card-top">
        <div class="card-logo">
           ${tool.img ? `<img src="${tool.img}" alt="${tool.name}">` : `<div style="color:#fff;font-weight:800">${tool.name[0]}</div>`}
        </div>
        <div class="card-score">${tool.score} <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      </div>
      <h3>${tool.name}</h3>
      <p>${tool.desc}</p>
      <div class="card-bottom">
        <span class="card-tag">${tool.tag}</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
      </div>
    </a>
  `).join('');
}
renderTools();
</script>
</body>
</html>
