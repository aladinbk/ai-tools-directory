<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best AI Writing Tools - AI Tools Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* VARIABLES & BASE */
:root{--blue:#3b82f6;--cyan:#06b6d4;--dark:#020617;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:rgba(148,163,184,0.7);--star:#fbbf24;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,0.18) 0%,transparent 70%),#020617;pointer-events:none;}

/* NAV */
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:68px;background:rgba(2,6,23,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.nav-logo-text span{color:#3b82f6;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links li a{padding:8px 14px;color:var(--muted);font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;transition:0.2s;}
.nav-links li a:hover, .nav-links li a.active{color:#fff;background:rgba(255,255,255,0.06);}

/* HERO */
.hero-cat{text-align:center;padding:80px 20px 40px;position:relative;z-index:1;}
.cat-badge{display:inline-flex;width:48px;height:48px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:14px;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;}
.hero-cat h1{font-family:'Syne',sans-serif;font-size:clamp(32px,5vw,54px);margin-bottom:14px;}
.hero-cat p{color:var(--muted);max-width:600px;margin:0 auto;line-height:1.6;}

/* GRID */
.tools-section{padding:20px 60px 80px;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
.grid-header{margin-bottom:30px;padding-bottom:15px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
.grid-header span{color:var(--blue);}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}

/* CARDS */
.card{display:flex;flex-direction:column;background:rgba(15,23,42,0.6);border:1px solid var(--border);border-radius:18px;padding:24px;text-decoration:none;color:var(--text);transition:all 0.3s ease;height:100%;}
.card:hover{transform:translateY(-6px);border-color:rgba(59,130,246,0.4);background:rgba(20,30,50,0.8);box-shadow:0 20px 40px rgba(0,0,0,0.4);}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.card-logo{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-logo img{width:100%;height:100%;object-fit:cover;}

/* SCORE STYLE (CLAUDE/GRAMMARLY LIKE) */
.card-score{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;color:#fff;}
.card-score svg{width:12px;height:12px;fill:var(--star);}

.card h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#fff;}
.card p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:20px;flex-grow:1;}

.card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
.card-tag{padding:5px 12px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd;border-radius:8px;font-size:11px;font-weight:600;text-transform:uppercase;}
.card-link-icon{color:var(--muted);transition:0.2s;}
.card:hover .card-link-icon{color:var(--blue);transform:translate(2px, -2px);}

footer{text-align:center;padding:40px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">A</div>
    <span class="nav-logo-text">AI<span>Tools</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="ai-writing-tools.html" class="active">Categories</a></li>
    <li><a href="#">Blog</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-btn-primary" style="padding: 8px 16px; border-radius: 8px; background: linear-gradient(135deg,#3b82f6,#06b6d4); border:none; color:#fff; font-weight:600; cursor:pointer;">+ Submit Tool</button>
  </div>
</nav>

<section class="hero-cat">
  <div class="cat-badge">✍️</div>
  <h1>Writing & Editing AI Tools</h1>
  <p>Our curated list of the 48 best AI writing assistants to boost your productivity.</p>
</section>

<section class="tools-section">
  <div class="grid-header">Showing <span>48</span> writing tools</div>
  <div class="tools-grid" id="toolsGrid"></div>
</section>

<footer>© 2026 AI Tools Directory</footer>

<script>
const writingTools = [
  { name: "Jasper", desc: "Enterprise-grade AI copywriting tool for marketing teams.", tag: "Copywriting", score: "4.9", img: "images/jasper.png", url: "https://jasperai.au/" },
  { name: "ChatGPT", desc: "The ultimate conversational AI for brainstorming and drafting.", tag: "General", score: "4.9", img: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg", url: "https://chatgpt.com/" },
  { name: "Copy AI", desc: "Generate marketing copy and social media posts in seconds.", tag: "Marketing", score: "4.8", img: "https://www.copy.ai/favicon.png", url: "https://www.copy.ai/" },
  { name: "Notion AI", desc: "Integrated workspace AI to summarize and write in your notes.", tag: "Productivity", score: "4.8", img: "https://upload.wikimedia.org/wikipedia/commons/4/45/Notion_app_logo.png", url: "https://www.notion.so/product/ai" },
  { name: "Writesonic", desc: "Create SEO-optimized articles and long-form blogs.", tag: "SEO", score: "4.7", img: "https://writesonic.com/favicon.ico", url: "https://writesonic.com/" },
  { name: "Grammarly", desc: "AI communication assistance to write and rewrite everywhere.", tag: "Editing", score: "4.8", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Grammarly_logo.svg", url: "https://www.grammarly.com/" },
  { name: "Claude", desc: "Anthropic's AI, excellent for natural writing and large texts.", tag: "General", score: "4.9", img: "https://www.anthropic.com/favicon.ico", url: "https://claude.ai/" },
  { name: "QuillBot", desc: "Advanced paraphrasing tool to rewrite and improve fluency.", tag: "Editing", score: "4.7", img: "https://quillbot.com/favicon.ico", url: "https://quillbot.com/" }
  // Ajoutez les autres ici avec le format : url: "https://..."
];

const grid = document.getElementById('toolsGrid');

function renderTools() {
  grid.innerHTML = writingTools.map(tool => {
    // Correction ici : On utilise tool.url au lieu de #
    const linkUrl = tool.url ? tool.url : "#";
    
    // Système de secours pour l'image
    const logoContent = tool.img 
      ? `<img src="${tool.img}" alt="${tool.name}" onerror="this.onerror=null; this.parentElement.innerHTML='<div style=\'background:linear-gradient(135deg,#3b82f6,#06b6d4);width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff\'>${tool.name.charAt(0)}</div>';">`
      : `<div style="background:linear-gradient(135deg,#3b82f6,#06b6d4);width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff">${tool.name.charAt(0)}</div>`;

    return `
      <a href="${linkUrl}" target="_blank" class="card">
        <div class="card-top">
          <div class="card-logo">${logoContent}</div>
          <div class="card-score">
            ${tool.score} <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
        </div>
        <h3>${tool.name}</h3>
        <p>${tool.desc}</p>
        <div class="card-bottom">
          <span class="card-tag">${tool.tag}</span>
          <svg class="card-link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
        </div>
      </a>
    `;
  }).join('');
}

renderTools();
</script>
</body>
</html>
