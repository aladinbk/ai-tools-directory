<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO.ai — AI Tools Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
:root{
    --seo-blue:#2563eb;
    --seo-green:#10b981;
    --dark:#020617;
    --border:rgba(255,255,255,0.07);
    --text:#e2e8f0;
    --muted:rgba(148,163,184,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}

body::before{
content:'';position:fixed;inset:0;
background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,99,235,.12),transparent),
radial-gradient(ellipse 40% 40% at 85% 75%,rgba(16,185,129,.08),transparent),#020617;
z-index:0;
}

/* NAV */
nav{
position:sticky;top:0;z-index:1000;
display:flex;align-items:center;justify-content:space-between;
padding:0 20px;height:68px;
background:rgba(2,6,23,0.9);
border-bottom:1px solid var(--border);
}

@media(min-width:1024px){
nav{padding:0 60px;}
}

.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-icon{
width:34px;height:34px;border-radius:9px;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
display:flex;align-items:center;justify-content:center;
font-weight:800;color:#fff;
}
.nav-logo-text{font-family:'Syne';font-weight:800;color:#fff;}
.nav-logo-text span{color:#3b82f6;}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
.hamburger span{width:24px;height:2px;background:#fff;}

@media(max-width:1023px){
.hamburger{display:flex;}
.nav-links,.nav-right{display:none;}
nav.menu-open .nav-links,
nav.menu-open .nav-right{
display:flex;flex-direction:column;
position:absolute;top:68px;left:0;right:0;
background:#0f172a;padding:20px;
}
}

.nav-links{display:flex;gap:10px;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;}
.nav-links a:hover{color:#fff;}

.nav-right{display:flex;gap:10px;}
.nav-btn-primary{
background:linear-gradient(135deg,#3b82f6,#06b6d4);
border:none;padding:7px 16px;color:#fff;border-radius:8px;
}

/* PAGE */
.page{max-width:1100px;margin:auto;padding:60px 20px;}

.tool-hero{display:flex;gap:40px;}
@media(max-width:900px){
.tool-hero{flex-direction:column-reverse;}
}

.tool-hero-left h1{
font-family:'Syne';
font-size:clamp(32px,4vw,52px);
}

.tool-actions{display:flex;gap:10px;flex-wrap:wrap;}

.btn-primary-seo{
background:linear-gradient(135deg,var(--seo-blue),var(--seo-green));
padding:12px 20px;border-radius:12px;color:#fff;text-decoration:none;
}

.btn-ghost{
padding:12px 20px;border:1px solid var(--border);
background:transparent;color:#fff;border-radius:12px;
}

.stats-bar{
display:grid;grid-template-columns:repeat(4,1fr);
margin-top:40px;
}

@media(max-width:900px){
.stats-bar{grid-template-columns:1fr 1fr;}
}

.features-grid{
display:grid;grid-template-columns:1fr 1fr;
gap:20px;margin-top:40px;
}

@media(max-width:900px){
.features-grid{grid-template-columns:1fr;}
}

.pc-grid{
display:grid;grid-template-columns:1fr 1fr;
gap:20px;margin-top:40px;
}

@media(max-width:900px){
.pc-grid{grid-template-columns:1fr;}
}

/* FOOTER */
footer{padding:60px 20px;margin-top:80px;border-top:1px solid var(--border);}

.footer-grid{
display:grid;grid-template-columns:1fr;
gap:30px;
}

@media(min-width:768px){
.footer-grid{grid-template-columns:1fr 1fr;}
}

@media(min-width:1024px){
.footer-grid{grid-template-columns:2fr 1fr 1fr 1fr;}
}

.footer-bottom{
margin-top:40px;
display:flex;justify-content:space-between;
flex-wrap:wrap;gap:10px;
}

@media(max-width:640px){
.footer-bottom{flex-direction:column;text-align:center;}
}
</style>
</head>

<body>

<nav id="mainNav">
<a href="#" class="nav-logo">
<div class="nav-logo-icon">A</div>
<span class="nav-logo-text">AI<span>Tools</span></span>
</a>

<div class="hamburger" id="hamburger">
<span></span><span></span><span></span>
</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">Categories</a></li>
<li><a href="#">Blog</a></li>
</ul>

<div class="nav-right">
<button class="nav-btn-primary">Submit</button>
</div>
</nav>

<div class="page">

<div class="tool-hero">
<div class="tool-hero-left">
<h1>Rank 1st on Google with <em>SEO.ai</em></h1>
<p>Powerful AI SEO platform to boost your rankings.</p>

<div class="tool-actions">
<a href="#" class="btn-primary-seo">Boost SEO</a>
<button class="btn-ghost">Save</button>
</div>
</div>
</div>

<div class="stats-bar">
<div>50k+ Users</div>
<div>4.7 Rating</div>
<div>SERP Analysis</div>
<div>2022</div>
</div>

<div class="features-grid">
<div>Keyword Research</div>
<div>SEO Editor</div>
<div>AI Content</div>
<div>Multi Language</div>
</div>

<div class="pc-grid">
<div>Pros</div>
<div>Cons</div>
</div>

</div>

<footer>
<div class="footer-grid">
<div>AI Tools Directory</div>
<div>Links</div>
<div>Company</div>
<div>Legal</div>
</div>

<div class="footer-bottom">
<p>© 2026 AI Tools</p>
</div>
</footer>

<script>
const hamburger=document.getElementById('hamburger');
const nav=document.getElementById('mainNav');

hamburger.onclick=()=>{
hamburger.classList.toggle('active');
nav.classList.toggle('menu-open');
};
</script>

</body>
</html>
