<style>
:root{--blue:#3b82f6;--cyan:#06b6d4;--dark:#020617;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:rgba(148,163,184,0.7);--star:#fbbf24;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,0.18) 0%,transparent 70%),#020617;pointer-events:none;}

/* NAV */
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:68px;background:rgba(2,6,23,0.82);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;box-shadow:0 0 18px rgba(59,130,246,0.45);}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.nav-logo-text span{color:#3b82f6;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links>li{position:relative;}
.nav-links>li>a,.nav-links>li>button{display:flex;align-items:center;gap:5px;padding:8px 14px;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;cursor:pointer;transition:color .2s,background .2s;}
.nav-links>li>a:hover,.nav-links>li>button:hover,.nav-links>li:hover>button{color:#fff;background:rgba(255,255,255,0.06);}
.nav-arrow{width:14px;height:14px;opacity:.5;transition:transform .3s;}
.nav-links>li:hover .nav-arrow{transform:rotate(180deg);opacity:1;}
.mega-drop{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(-6px);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;min-width:760px;background:rgba(10,18,40,0.97);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 30px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(59,130,246,0.08);}
.nav-links>li:hover .mega-drop{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
.mega-drop-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding:0 4px;}
.mega-drop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.mega-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--text);transition:background .2s,transform .2s;}
.mega-item:hover{background:rgba(59,130,246,0.1);transform:translateX(2px);}
.mega-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.mega-item-text strong{display:block;font-size:12px;font-weight:600;color:#fff;}
.mega-item-text span{font-size:11px;color:var(--muted);}
.simple-drop{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(-6px);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;min-width:200px;background:rgba(10,18,40,0.97);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:12px;padding:8px;box-shadow:0 20px 50px rgba(0,0,0,0.5);}
.nav-links>li:hover .simple-drop{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
.simple-drop a{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;text-decoration:none;color:var(--text);font-size:13px;transition:background .2s;}
.simple-drop a:hover{background:rgba(255,255,255,0.06);}
.simple-drop a .si{font-size:15px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-btn-ghost{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s,background .2s;}
.nav-btn-ghost:hover{border-color:rgba(59,130,246,0.5);color:#fff;background:rgba(59,130,246,0.08);}
.nav-btn-primary{padding:7px 18px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(59,130,246,0.35);}
.nav-btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.5);}

/* --- HERO & SEARCH --- */
.hero{position:relative;z-index:1;text-align:center;padding:100px 20px 80px;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:99px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);font-size:12px;font-weight:500;color:#93c5fd;margin-bottom:28px;}
h1{font-family:'Syne',sans-serif;font-size:clamp(38px,6vw,68px);font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:18px;}
h1 em{font-style:normal;background:linear-gradient(90deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p.hero-sub { font-size: clamp(16px, 2vw, 18px); color: var(--muted); max-width: 600px; margin: 0 auto 40px auto; line-height: 1.6;}

.search-wrapper{position:relative;max-width:660px;margin:0 auto;z-index:50;} 
.search-bar{display:flex;align-items:center;background:rgba(15,23,42,0.85);border:1px solid rgba(59,130,246,0.22);border-radius:16px;padding:6px 6px 6px 20px;gap:10px;backdrop-filter:blur(20px);}
.search-input{flex:1;border:none;background:transparent;color:#fff;font-size:15px;outline:none;}
.search-submit{padding:0 22px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;color:#fff;font-weight:600;cursor:pointer;}

.search-suggestions{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:500;background:#060c1e;border:1px solid rgba(59,130,246,0.3);border-radius:16px;padding:10px;opacity:0;pointer-events:none;transform:translateY(-6px);transition:0.2s ease; text-align: left;}
.search-suggestions.open{opacity:1;pointer-events:all;transform:translateY(0);}

/* --- SECTIONS THEMES (Les "Rayons") --- */
.section { padding: 60px 60px; max-width: 1300px; margin: 0 auto; position: relative; z-index: 1;}
.section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;}
.section-label { font-size: 11px; text-transform: uppercase; color: var(--blue); letter-spacing: 2px; font-weight: 700; margin-bottom: 8px;}
.section-title { font-family: 'Syne', sans-serif; font-size: clamp(24px, 4vw, 28px); font-weight: 800; } /* Responsive title */
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px;}

.tool-card { background: rgba(15,23,42,0.6); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-decoration: none; color: var(--text); display: flex; flex-direction: column; align-items: center; text-align: center; transition: 0.3s; backdrop-filter: blur(10px); height: 100%;}
.tool-card:hover { transform: translateY(-8px); border-color: var(--blue); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.tool-logo-wrap { width: 54px; height: 54px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; border: 1px solid var(--border); font-size: 24px; /* For text icons */}
.tool-logo-wrap img { width: 34px; height: 34px; object-fit: contain; }
.tool-card h3 { font-size: clamp(15px, 3vw, 17px); font-weight: 700; color: #fff; margin-bottom: 8px; } /* Responsive title */
.tool-card p { font-size: clamp(12px, 2.5vw, 13px); color: var(--muted); line-height: 1.5; } /* Responsive text */

/* --- VIDEO HUB (SHORTS) --- */
.video-section { padding: 80px 60px; max-width: 1300px; margin: 0 auto; position: relative; z-index: 1;}
.shorts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 30px;}
.short-card { background: #000; border-radius: 24px; overflow: hidden; aspect-ratio: 9/16; border: 1px solid var(--border); transition: 0.3s; position: relative;}
.short-card:hover { transform: translateY(-5px); border-color: var(--blue); box-shadow: 0 0 30px rgba(59,130,246,0.2); }
.short-card iframe { width: 100%; height: 100%; border: none; }

/* --- WHY AI SECTION --- */
.why-ai-section { position: relative; z-index: 1; padding: 60px; max-width: 1200px; margin: 0 auto; }
.why-ai-card { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); border-radius: 32px; padding: 60px; backdrop-filter: blur(12px); display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.why-ai-text h2 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 32px); font-weight: 800; margin-bottom: 20px; line-height: 1.2; } /* Responsive title */
.why-ai-text p { font-size: clamp(15px, 3vw, 17px); color: var(--muted); line-height: 1.8; } /* Responsive text */
.stat-box { padding: 24px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 20px; text-align: center; }
.stat-box span { font-size: 28px; margin-bottom: 12px; display: block; } /* Icon size */

/* --- FOOTER MODERNE & COMPLET --- */
footer {
  position: relative;
  z-index: 1;
  background: rgba(2, 6, 23, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 80px 60px 40px;
  margin-top: 100px;
}

.footer-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1.5fr;
  gap: 60px;
  margin-bottom: 60px;
}

.footer-brand .nav-logo {
  margin-bottom: 20px;
}

.footer-brand p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 280px;
}

.footer-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.footer-links {
  list-style: none;
}

.footer-links li {
  margin-bottom: 12px;
}

.footer-links a {
  font-size: 14px;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.2s ease;
}

.footer-links a:hover {
  color: var(--blue);
  padding-left: 5px;
}

.footer-contact-info {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

.footer-contact-info strong {
  color: #fff;
  display: block;
  margin-bottom: 8px;
}

.footer-bottom {
  max-width: 1200px;
  margin: 0 auto;
  padding-top: 30px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: 13px;
}

/* --- RESPONSIVE DESIGN --- */

/* Navigation */
@media (max-width: 900px) {
  nav {
    padding: 0 20px; /* Réduire le padding sur les côtés */
  }
  .nav-logo-icon {
    width: 30px; height: 30px; font-size: 14px; /* Ajuster l'icône */
  }
  .nav-logo-text {
    font-size: 16px; /* Ajuster le texte du logo */
  }
  .nav-links {
    display: none; /* Masquer les liens de navigation sur mobile */
    flex-direction: column;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(2, 6, 23, 0.95);
    padding: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }
  .nav-links.open {
    display: flex; /* Afficher les liens quand le menu est ouvert */
  }
  .nav-links li {
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
  }
  .nav-links li a, .nav-links li button {
    width: 100%;
    justify-content: center;
  }
  /* Mega Dropdown pour mobile */
  .mega-drop {
    position: static;
    transform: none;
    opacity: 1;
    pointer-events: all;
    min-width: 100%;
    margin-top: 10px;
    padding: 10px;
    box-shadow: none;
    border: none;
     background: rgba(10, 18, 40, 0.95); /* Légère différence pour le distinguo */
  }
   .mega-drop-grid {
    grid-template-columns: 1fr 1fr; /* 2 colonnes sur mobile */
  }
  .mega-item {
    padding: 8px;
   }
   .mega-item-text strong { font-size: 11px; }
   .mega-item-text span { font-size: 10px; }

  /* Simple Dropdown pour mobile */
  .simple-drop {
    position: static;
    transform: none;
    opacity: 1;
    pointer-events: all;
    min-width: 100%;
    margin-top: 10px;
    padding: 8px;
    box-shadow: none;
    border: none;
    background: rgba(10, 18, 40, 0.95);
  }
  .simple-drop a { padding: 9px 12px; font-size: 13px; }

  .nav-right {
    display: none; /* Masquer les boutons sur mobile pour l'instant, ajouter un bouton menu */
  }
   .nav-right .nav-btn-ghost { display: none; } /* Cache le bouton Sign In */
   .nav-right .nav-btn-primary { display: none; } /* Cache le bouton Submit Tool */

  .hamburger-menu { /* Bouton menu hamburger - ajout */
    display: block;
    cursor: pointer;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }
  .hamburger-menu div {
    width: 25px;
    height: 2px;
    background-color: var(--text);
    margin: 5px 0;
    transition: 0.4s;
  }
}

/* Hero */
@media (max-width: 768px) {
  .hero {
    padding: 80px 20px 60px;
  }
  h1 {
    font-size: clamp(30px, 8vw, 54px); /* Réduire la taille du titre principal */
  }
  .hero-badge {
    font-size: 11px;
    padding: 4px 12px;
    margin-bottom: 20px;
  }
  .hero-sub {
    font-size: clamp(15px, 3vw, 17px);
    margin-bottom: 30px;
  }
  .search-bar {
    padding: 4px 4px 4px 15px; /* Réduire padding barre de recherche */
  }
  .search-input {
    font-size: 14px;
  }
  .search-submit {
    padding: 0 18px;
    height: 40px;
    font-size: 13px;
  }
}

/* Sections principales */
@media (max-width: 900px) {
    nav, .section, .video-section, .why-ai-section { padding: 30px 20px; } /* Padding réduit pour les sections */
    .section-header { flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .section-header > div { margin-bottom: 15px; }
    .section-header a { font-size: 12px; }

    .tools-grid {
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); /* Grille plus petite */
      gap: 15px;
    }
    .tool-card { padding: 20px; }
    .tool-logo-wrap { width: 48px; height: 48px; margin-bottom: 12px; }
    .tool-card h3 { font-size: 15px; margin-bottom: 6px; }
    .tool-card p { font-size: 12px; }

    /* Video Section */
    .video-section { padding: 60px 20px; }
    .shorts-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); } /* Colonnes pour les shorts */

    /* Why AI Section */
    .why-ai-section { padding: 40px 20px; }
    .why-ai-card { grid-template-columns: 1fr; padding: 40px; text-align: center; gap: 30px;}
    .why-ai-text h2 { font-size: 28px; }
    .why-ai-text p { font-size: 15px; }
    .why-ai-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } /* Stats côte à côte */
}

/* Footer */
@media(max-width: 900px) {
  footer { padding: 60px 20px 30px; }
  .footer-grid {
    grid-template-columns: 1fr 1fr; /* 2 colonnes pour le footer */
    gap: 40px;
  }
  .footer-bottom {
    flex-direction: column; /* Aligner les éléments du bas du footer en colonne */
    gap: 15px;
    text-align: center;
  }
  .footer-bottom p { font-size: 12px; }
  .footer-bottom div { display: flex; justify-content: center; width: 100%; } /* Pour centrer les liens sociaux */
}

@media(max-width: 500px) {
  .footer-grid { grid-template-columns: 1fr; /* 1 colonne pour les petits écrans */ }
  .footer-title { margin-bottom: 16px; }
  .footer-links a { font-size: 13px; }
}

/* Ajustements spécifiques pour les petits écrans (ex: téléphone) */
@media (max-width: 480px) {
  nav { height: 60px; } /* Hauteur de la nav plus petite */
  .nav-logo-icon { width: 28px; height: 28px; font-size: 13px; }
  .nav-logo-text { font-size: 15px; }
  
  .hero { padding: 60px 15px 40px; }
  h1 { font-size: 32px; line-height: 1.2; } /* Titre plus petit */
  .hero-badge { display: none; } /* Cacher le badge sur très petits écrans */
  .hero-sub { font-size: 14px; margin-bottom: 25px;}
  .search-wrapper { width: 100%; }
  .search-bar { padding: 4px 4px 4px 12px; border-radius: 12px; }
  .search-input { font-size: 13px; }
  .search-submit { padding: 0 15px; height: 38px; font-size: 12px; border-radius: 10px;}

  .section { padding: 40px 15px; }
  .section-title { font-size: 22px; }
  .tools-grid { grid-template-columns: 1fr; gap: 15px; } /* Une seule colonne pour les cartes */
  .tool-card { padding: 18px; }
  .tool-logo-wrap { width: 44px; height: 44px; margin-bottom: 10px; }
  .tool-card h3 { font-size: 14px; margin-bottom: 5px; }
  .tool-card p { font-size: 11px; }

  .video-section { padding: 50px 15px; }
  .shorts-grid { grid-template-columns: 1fr; gap: 15px; } /* Une seule colonne pour les shorts */

  .why-ai-section { padding: 30px 15px; }
  .why-ai-card { padding: 30px; gap: 20px; }
  .why-ai-text h2 { font-size: 24px; }
  .why-ai-text p { font-size: 14px; }
  .stat-box { padding: 20px; }
  .stat-box span { font-size: 24px; margin-bottom: 10px; }

  footer { padding: 50px 15px 25px; margin-top: 70px;}
  .footer-grid { margin-bottom: 40px; }
  .footer-bottom { padding-top: 20px; font-size: 12px; }
}

/* Ajout d'un bouton menu hamburger quand les nav-links sont masqués */
.hamburger-menu {
    display: none; /* Caché par défaut, affiché sur mobile par @media */
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    margin-left: auto; /* Pousse le bouton vers la droite */
}

.hamburger-menu .bar {
    width: 24px;
    height: 2px;
    background-color: var(--text);
    margin: 4px 0;
    transition: 0.4s;
}

/* Style pour le menu hamburger ouvert */
nav.menu-open .hamburger-menu .bar:nth-child(1) {
  transform: translateY(6px) rotate(45deg);
}
nav.menu-open .hamburger-menu .bar:nth-child(2) {
  opacity: 0;
}
nav.menu-open .hamburger-menu .bar:nth-child(3) {
  transform: translateY(-6px) rotate(-45deg);
}
