<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best AI Tools Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8783224760065899" crossorigin="anonymous">
 </script>
<style>
:root{--blue:#3b82f6;--cyan:#06b6d4;--dark:#020617;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:rgba(148,163,184,0.7);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,0.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 90% 80%,rgba(6,182,212,0.10) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 10% 90%,rgba(99,102,241,0.08) 0%,transparent 60%),#020617;pointer-events:none;}

/* NAV */
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:68px;background:rgba(2,6,23,0.82);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;box-shadow:0 0 18px rgba(59,130,246,0.45);}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.nav-logo-text span{color:#3b82f6;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links>li{position:relative;}
.nav-links>li>a,.nav-links>li>button{display:flex;align-items:center;gap:5px;padding:8px 14px;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;cursor:pointer;transition:color .2s,background .2s;}
.nav-links>li>a:hover,.nav-links>li>button:hover,.nav-links>li:hover>button{color:#fff;background:rgba(255,255,255,0.06);}
.nav-arrow{width:14px;height:14px;opacity:.5;transition:transform .3s;}
.nav-links>li:hover .nav-arrow{transform:rotate(180deg);opacity:1;}
.mega-drop{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(-6px);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;min-width:760px;background:rgba(10,18,40,0.97);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 30px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(59,130,246,0.08);}
.nav-links>li:hover .mega-drop{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
.mega-drop-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding:0 4px;}
.mega-drop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.mega-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--text);transition:background .2s,transform .2s;}
.mega-item:hover{background:rgba(59,130,246,0.1);transform:translateX(2px);}
.mega-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.mega-item-text strong{display:block;font-size:12px;font-weight:600;color:#fff;}
.mega-item-text span{font-size:11px;color:var(--muted);}
.simple-drop{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(-6px);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;min-width:200px;background:rgba(10,18,40,0.97);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:12px;padding:8px;box-shadow:0 20px 50px rgba(0,0,0,0.5);}
.nav-links>li:hover .simple-drop{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
.simple-drop a{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;text-decoration:none;color:var(--text);font-size:13px;transition:background .2s;}
.simple-drop a:hover{background:rgba(255,255,255,0.06);}
.simple-drop a .si{font-size:15px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-btn-ghost{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s,background .2s;}
.nav-btn-ghost:hover{border-color:rgba(59,130,246,0.5);color:#fff;background:rgba(59,130,246,0.08);}
.nav-btn-primary{padding:7px 18px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(59,130,246,0.35);}
.nav-btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.5);}

/* HERO */
.hero{position:relative;z-index:1;text-align:center;padding:100px 20px 80px;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:99px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);font-size:12px;font-weight:500;color:#93c5fd;margin-bottom:28px;animation:fadeDown .8s ease both;}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:#3b82f6;box-shadow:0 0 8px #3b82f6;animation:pulse 2s infinite;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(38px,6vw,68px);font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:18px;animation:fadeDown .8s .1s ease both;}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,#3b82f6,#06b6d4,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:17px;color:var(--muted);max-width:500px;margin:0 auto 42px;line-height:1.7;animation:fadeDown .8s .2s ease both;}

/* SEARCH (CORRIGÉ : z-index ajouté et isolation retirée) */
.search-wrapper{position:relative;max-width:660px;margin:0 auto;animation:fadeDown .8s .3s ease both; z-index:50;} 
.search-bar{display:flex;align-items:center;background:rgba(15,23,42,0.85);border:1px solid rgba(59,130,246,0.22);border-radius:16px;padding:6px 6px 6px 20px;gap:10px;backdrop-filter:blur(20px);transition:border-color .3s,box-shadow .3s;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);position:relative;z-index:2;}
.search-bar.focused{border-color:rgba(59,130,246,0.6);box-shadow:0 0 0 4px rgba(59,130,246,0.12),0 8px 32px rgba(0,0,0,0.4);}
.search-icon{flex-shrink:0;color:#3b82f6;opacity:.6;transition:opacity .2s;}
.search-bar.focused .search-icon{opacity:1;}
.search-input{flex:1;border:none;background:transparent;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;outline:none;padding:10px 0;}
.search-input::placeholder{color:rgba(148,163,184,0.38);}
.search-divider{width:1px;height:24px;background:rgba(255,255,255,0.08);flex-shrink:0;}
.search-filter{padding:0 12px;height:40px;background:transparent;border:none;color:rgba(148,163,184,0.6);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;flex-shrink:0;}
.search-filter option{background:#0a1228;color:#e2e8f0;}
.search-submit{flex-shrink:0;padding:0 22px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(59,130,246,0.4);display:flex;align-items:center;gap:8px;}
.search-submit:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.55);}
/* FOND OPAQUE POUR LES SUGGESTIONS */
.search-suggestions{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:500;background:#060c1e;border:1px solid rgba(59,130,246,0.3);border-radius:16px;padding:10px;box-shadow:0 28px 60px rgba(0,0,0,0.9),0 0 0 1px rgba(59,130,246,0.1);opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .2s ease,transform .2s ease;}
.search-suggestions.open{opacity:1;pointer-events:all;transform:translateY(0);}
.sugg-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted);padding:6px 12px 4px;font-weight:600;}
.sugg-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:background .15s;font-size:13px;color:var(--text);text-decoration:none;}
.sugg-item:hover{background:rgba(59,130,246,0.1);}
.sugg-item-icon{font-size:17px;width:30px;text-align:center;flex-shrink:0;}
.sugg-item-info{flex:1;min-width:0;}
.sugg-item-info strong{display:block;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sugg-item-info small{font-size:11px;color:var(--muted);}
.sugg-tag{margin-left:auto;padding:2px 9px;border-radius:99px;flex-shrink:0;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.22);font-size:10px;color:#60a5fa;font-weight:500;}
.sugg-no-result{text-align:center;padding:18px;color:var(--muted);font-size:13px;}

/* STATS */
.hero-stats{display:flex;align-items:center;justify-content:center;gap:32px;margin-top:40px;animation:fadeDown .8s .4s ease both; flex-wrap: wrap;}
.stat{text-align:center;}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}
.stat-div{width:1px;height:32px;background:var(--border);}

/* CATEGORIES */
.cats-section{position:relative;z-index:1;padding:70px 60px;}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#3b82f6;margin-bottom:8px;font-weight:600;}
.section-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:36px;}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.cat-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;background:rgba(15,23,42,0.55);border:1px solid var(--border);text-decoration:none;color:var(--text);backdrop-filter:blur(12px);transition:background .25s,border-color .25s,transform .25s,box-shadow .25s;opacity:0;transform:translateY(18px);animation:fadeUp .6s forwards;}
.cat-card:nth-child(1){animation-delay:.04s;}.cat-card:nth-child(2){animation-delay:.08s;}.cat-card:nth-child(3){animation-delay:.12s;}.cat-card:nth-child(4){animation-delay:.16s;}.cat-card:nth-child(5){animation-delay:.20s;}.cat-card:nth-child(6){animation-delay:.24s;}.cat-card:nth-child(7){animation-delay:.28s;}.cat-card:nth-child(8){animation-delay:.32s;}.cat-card:nth-child(9){animation-delay:.36s;}.cat-card:nth-child(10){animation-delay:.40s;}.cat-card:nth-child(11){animation-delay:.44s;}.cat-card:nth-child(12){animation-delay:.48s;}
.cat-card:hover{background:rgba(59,130,246,0.09);border-color:rgba(59,130,246,0.28);transform:translateX(4px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.cat-icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid rgba(255,255,255,0.06);}
.cat-info strong{display:block;font-size:13px;font-weight:600;color:#fff;margin-bottom:2px;}
.cat-info span{font-size:11px;color:var(--muted);}
.cat-count{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:600;color:var(--muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:2px 8px;border-radius:99px;}

/* FEATURED */
.section{position:relative;z-index:1;padding:0 60px 80px;}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;}
.section-link{font-size:13px;color:#3b82f6;text-decoration:none;display:flex;align-items:center;gap:5px;font-weight:500;opacity:.8;transition:opacity .2s;}
.section-link:hover{opacity:1;}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px;}
.tool-card{position:relative;overflow:hidden;background:rgba(15,23,42,0.6);border:1px solid var(--border);border-radius:18px;padding:28px 22px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;height:210px;justify-content:center;transition:transform .3s,border-color .3s,box-shadow .3s;backdrop-filter:blur(12px);opacity:0;transform:translateY(24px);animation:fadeUp .7s forwards;}
.tool-card:nth-child(1){animation-delay:.05s;}.tool-card:nth-child(2){animation-delay:.15s;}.tool-card:nth-child(3){animation-delay:.25s;}.tool-card:nth-child(4){animation-delay:.35s;}.tool-card:nth-child(5){animation-delay:.45s;}
.tool-card::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.05) 50%,transparent 70%);background-size:200% 100%;background-position:200% 0;transition:.6s;}
.tool-card:hover::before{background-position:-200% 0;}
.tool-card:hover{transform:translateY(-8px);border-color:rgba(59,130,246,0.35);box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 0 1px rgba(59,130,246,0.12);}
.tool-card::after{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.8),transparent);opacity:0;transition:opacity .3s;}
.tool-card:hover::after{opacity:1;}
.tool-logo-wrap{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);overflow:hidden;flex-shrink:0;transition:transform .35s;}
.tool-card:hover .tool-logo-wrap{transform:scale(1.1) rotate(3deg);}
.tool-logo-wrap img{width:36px;height:36px;object-fit:contain;}
.tool-card h3{font-size:15px;font-weight:700;color:#fff;}
.tool-card p{font-size:12px;color:var(--muted);line-height:1.55;}

footer{position:relative;z-index:1;text-align:center;padding:36px 40px;background:rgba(2,6,23,0.9);border-top:1px solid var(--border);font-size:13px;color:var(--muted);}

@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.5);}50%{box-shadow:0 0 0 5px rgba(59,130,246,0);}}

/* RESPONSIVE AJUSTÉ */
@media(max-width:900px){nav{padding:0 20px;}.nav-links,.nav-right .nav-btn-ghost{display:none;}.cats-section{padding:50px 20px;}.section{padding:0 20px 60px;}.hero{padding:80px 20px 60px;}.cats-grid{grid-template-columns:1fr 1fr;}.section-header{flex-direction:column;align-items:flex-start;gap:12px;}}

/* CORRECTION MOBILE (Moins de 600px) */
@media(max-width:600px){
  .search-bar { padding: 4px 4px 4px 14px; }
  .search-filter, .search-divider { display: none; } /* On cache le filtre pour gagner de la place */
  .search-submit { font-size: 0; padding: 0 16px; } /* On cache le texte "Search" */
  .search-submit svg { margin: 0; width: 18px; height: 18px; }
  .hero-stats { gap: 16px; margin-top: 30px; }
  .stat-div { display: none; } /* Cache la barre verticale si les stats passent à la ligne */
}

@media(max-width:500px){
  .cats-grid { grid-template-columns: 1fr; }
  .tools-grid { grid-template-columns: 1fr; } /* Corrigé ici : 1fr au lieu de 1fr 1fr pour ne pas déborder */
}
/* --- FOOTER MODERNE & COMPLET --- */

  margin-bottom: 20px;

.footer-bottom {

/* RESPONSIVE FOOTER */
@media(max-width: 900px) {
  footer { padding: 60px 20px 30px; }

    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }
}

@media(max-width: 500px) {
  .footer-grid { grid-template-columns: 1fr; }
  .footer-bottom { flex-direction: column; gap: 15px; text-align: center; }
}
/* --- WHY AI SECTION --- */
.why-ai-section {
  position: relative;
  z-index: 1;
  padding: 80px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

.why-ai-card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid var(--border);
  border-radius: 32px;
  padding: 60px;
  backdrop-filter: blur(12px);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.why-ai-text h2 {
  font-family: 'Syne', sans-serif;

  font-weight: 800;
  margin-bottom: 20px;

}

  font-size: 17px;
  color: var(--muted);

}

.why-ai-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.stat-box {
  padding: 24px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 20px;

  transition: 0.3s;
}

.stat-box:hover {
  border-color: var(--blue);
  background: rgba(59, 130, 246, 0.05);
}

.stat-box span {
  display: block;
  font-size: 24px;
  margin-bottom: 10px;
}

.stat-box strong {
  display: block;
  font-size: 14px;
  color: #fff;
  font-weight: 600;
}

@media(max-width: 900px) {
  .why-ai-card { grid-template-columns: 1fr; padding: 40px; gap: 40px; }
  .why-ai-section { padding: 40px 20px; }
}
</style>
</head>
